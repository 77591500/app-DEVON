<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido - Enterprise App</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Página de Bienvenida -->
    <div class="main-container">
	    <h1>🚀 Despliegue Automatizado v2.0 con Jenkins y Docker</h1>
        <p>Sistema de gestión de infraestructura automatizada.</p>
        <hr>

        <div class="actions">
            <a href="views/auth/login.html" class="btn">
                Ingresar al Sistema
            </a>
        </div>
    </div>

    <!-- Dashboard DevOps -->
    <div class="devops-container">
        <header class="dashboard-header">
            <h1>DevOps Control Panel <span class="badge">v2.0</span></h1>
            <p>Desplegado Automáticamente por: <strong>Jenkins Enterprise Server</strong></p>
        </header>

        <div class="metrics-grid">
            <div class="metric-card" id="cpu-card">
                <h3>Uso de CPU (Simulado)</h3>
                <div class="metric-value" id="cpu-value">0%</div>
                <div class="progress-bar">
                    <div class="progress" id="cpu-bar"></div>
                </div>
            </div>

            <div class="metric-card" id="ram-card">
                <h3>Consumo de Memoria RAM</h3>
                <div class="metric-value" id="ram-value">0 GB</div>
                <div class="progress-bar">
                    <div class="progress" id="ram-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Cargar JavaScript -->
    <script src="js/dashboard.js"></script>

</body>
</html>
