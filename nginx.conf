events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        location / {
            # 🚨 AQUÍ ESTÁ EL TRUCO: 
            # No usamos una IP, usamos el NOMBRE del contenedor de Docker que le daremos en el pipeline.
            # Docker resolverá este nombre automáticamente gracias a su red interna (Service Discovery básico).
            proxy_pass http://mi-app-banco:80;
            
            # Configuraciones estándar para que el backend sepa de dónde viene el tráfico real
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded-for;
        }
    }
}
