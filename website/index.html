<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Banco Seguro - Panel Principal</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; text-align: center; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; }
        h1 { color: #1e3a8a; }
        .balance { font-size: 24px; color: #10b981; font-weight: bold; margin: 20px 0; }
        button { background-color: #1e3a8a; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #3b82f6; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Sistemas Centrales - Banco Seguro</h1>
        <p>Bienvenido al entorno intermediado por Nginx</p>
        <div class="balance">Saldo Disponible: $1,000.00</div>
        <button onclick="alert('Transacción procesada con éxito en el backend protegido')">Hacer Depósito Seguro</button>
    </div>
</body>
</html>
